<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SecureVault – {% block title %}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #080b14;
      color: #d4d8f0;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    /* Animated grid background — z-index:-1 keeps it behind Bootstrap's
       modal backdrop (1040) and dialog (1050), fixing the frozen-modal bug */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,131,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,131,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: -1;
    }

    /* Glowing orb — also behind all content */
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(124,131,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    /* Container sits in normal flow — no explicit z-index needed */
    .container { position: relative; }

    /* Guarantee Bootstrap modal layers are never clipped by custom stacking */
    .modal-backdrop { z-index: 1040 !important; }
    .modal          { z-index: 1050 !important; }

    /* ── Navbar ── */
    .navbar {
      background: rgba(15, 18, 32, 0.85) !important;
      border-bottom: 1px solid rgba(124,131,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0.75rem 0;
    }
    .navbar-brand {
      color: #fff !important;
      font-weight: 700;
      font-size: 1.2rem;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar-brand .brand-icon {
      background: linear-gradient(135deg, #7c83ff, #a78bfa);
      border-radius: 8px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      box-shadow: 0 0 16px rgba(124,131,255,0.4);
    }
    .nav-user-chip {
      background: rgba(124,131,255,0.1);
      border: 1px solid rgba(124,131,255,0.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.85rem;
      color: #a5aacc;
      display: flex; align-items: center; gap: 6px;
    }
    .btn-logout {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
      border-radius: 8px;
      padding: 4px 14px;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .btn-logout:hover {
      background: rgba(239,68,68,0.2);
      color: #fca5a5;
      text-decoration: none;
    }

    /* ── Cards ── */
    .card {
      background: rgba(20, 24, 42, 0.8);
      border: 1px solid rgba(124,131,255,0.12);
      border-radius: 16px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .card-glow {
      box-shadow: 0 0 0 1px rgba(124,131,255,0.15), 0 8px 32px rgba(0,0,0,0.4), 0 0 60px rgba(124,131,255,0.05);
    }

    /* ── Buttons ── */
    .btn-primary {
      background: linear-gradient(135deg, #7c83ff, #6366f1);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      padding: 10px 20px;
      letter-spacing: 0.2px;
      box-shadow: 0 4px 15px rgba(124,131,255,0.3);
      transition: all 0.2s;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      box-shadow: 0 6px 20px rgba(124,131,255,0.45);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    /* ── Form Controls ── */
    .form-label {
      color: #c8cde8;       /* FIX: was inheriting dark colour — now clearly visible */
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .form-control {
      background: rgba(8, 11, 20, 0.6);
      border: 1px solid rgba(124,131,255,0.2);
      border-radius: 10px;
      color: #e8eaf6;       /* FIX: input text clearly white */
      padding: 10px 14px;
      transition: all 0.2s;
    }
    .form-control::placeholder { color: #4a5080; }
    .form-control:focus {
      background: rgba(8, 11, 20, 0.8);
      border-color: #7c83ff;
      color: #e8eaf6;
      box-shadow: 0 0 0 3px rgba(124,131,255,0.18);
    }
    .form-control[type="file"] { padding: 8px 14px; }

    /* ── Auth card extras ── */
    .auth-card-header {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .auth-card-header .icon-wrap {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, rgba(124,131,255,0.2), rgba(99,102,241,0.1));
      border: 1px solid rgba(124,131,255,0.25);
      border-radius: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: #7c83ff;
      margin-bottom: 0.75rem;
      box-shadow: 0 0 20px rgba(124,131,255,0.2);
    }
    .auth-card-header h4 {
      color: #fff;
      font-weight: 700;
      font-size: 1.3rem;
      margin-bottom: 0.25rem;
    }
    .auth-card-header p {
      color: #6b7280;
      font-size: 0.85rem;
      margin: 0;
    }
    .auth-divider {
      text-align: center;
      margin-top: 1.25rem;
      font-size: 0.875rem;
      color: #6b7280;
    }
    .auth-divider a { color: #7c83ff; text-decoration: none; font-weight: 500; }
    .auth-divider a:hover { color: #a5aaff; text-decoration: underline; }

    /* ── Table ── */
    .table { color: #c8cde8; margin: 0; }
    .table thead tr { background: rgba(12,15,28,0.6); }
    .table thead th {
      color: #6b7280;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid rgba(124,131,255,0.1);
      padding: 12px 16px;
    }
    .table tbody tr {
      border-bottom: 1px solid rgba(124,131,255,0.06);
      transition: background 0.15s;
    }
    .table tbody tr:hover { background: rgba(124,131,255,0.05); }
    .table tbody td { padding: 14px 16px; vertical-align: middle; border: none; }

    /* ── Badges ── */
    .badge-enc {
      background: rgba(74,222,128,0.1);
      color: #4ade80;
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* ── Stat cards ── */
    .stat-card {
      padding: 1.25rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(124,131,255,0.04), transparent);
      pointer-events: none;
    }
    .stat-value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-label { color: #6b7280; font-size: 0.8rem; margin-top: 6px; font-weight: 500; }

    /* ── Alerts ── */
    .alert {
      border-radius: 12px;
      border: none;
      font-size: 0.9rem;
    }
    .alert-success { background: rgba(74,222,128,0.1); color: #4ade80; }
    .alert-danger  { background: rgba(239,68,68,0.1);  color: #f87171; }
    .alert-warning { background: rgba(251,191,36,0.1); color: #fbbf24; }

    /* ── Modal ── */
    .modal-content {
      background: rgba(16, 20, 36, 0.97);
      border: 1px solid rgba(124,131,255,0.15);
      border-radius: 16px;
      backdrop-filter: blur(20px);
    }
    .modal-header { border-bottom: 1px solid rgba(124,131,255,0.1); }
    .modal-footer { border-top:    1px solid rgba(124,131,255,0.1); }
    .modal-title { color: #e0e4ff; font-weight: 600; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 4rem 1rem; }
    .empty-state i { font-size: 3rem; color: #2e3460; display: block; margin-bottom: 1rem; }
    .empty-state p { color: #4a5080; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="#">
      <span class="brand-icon"><i class="bi bi-shield-lock-fill"></i></span>
      SecureVault
    </a>
    {% if session.username %}
    <div class="ms-auto d-flex align-items-center gap-2">
      <span class="nav-user-chip"><i class="bi bi-person-circle"></i> {{ session.username }}</span>
      <a href="/logout" class="btn-logout">Logout</a>
    </div>
    {% endif %}
  </div>
</nav>

<div class="container mt-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        <i class="bi bi-{% if cat == 'success' %}check-circle{% elif cat == 'danger' %}exclamation-circle{% else %}info-circle{% endif %}-fill me-2"></i>
        {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
